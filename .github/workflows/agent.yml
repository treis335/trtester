name: Agente Autónomo

on:
  schedule:
    - cron: '0 */6 * * *'  # a cada 6 horas
  workflow_dispatch:        # manualmente

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install axios
      - name: Executar Agente
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node agent/orchestrator.js
      - name: Commit e Push
        run: |
          git config user.name "Bot Agent"
          git config user.email "agent@bot.com"
          git add -A
          git diff --quiet || git commit -m "🤖 Atualização automática do agente"
          git push